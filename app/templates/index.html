<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reservation Audit Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --text: #f1f5f9; --text-muted: #94a3b8;
      --danger: #ef4444; --warn: #f59e0b; --ok: #22c55e;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      padding-bottom: calc(1.5rem + var(--safe-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      width: 100%; max-width: 520px;
    }
    .logo {
      text-align: center; margin-bottom: 2rem;
    }
    .logo .icon {
      width: 56px; height: 56px; margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(59,130,246,.25);
    }
    .logo .icon svg {
      width: 28px; height: 28px; color: #fff;
    }
    .logo h1 {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .logo h1 span { color: var(--accent); }
    .logo p { color: var(--text-muted); margin-top: .5rem; font-size: .9rem; line-height: 1.5; }

    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 1.75rem; border: 1px solid var(--surface2);
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
    }

    .drop-zone {
      border: 2px dashed var(--surface2); border-radius: var(--radius);
      padding: 2.5rem 1.5rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
      -webkit-user-select: none; user-select: none;
      min-height: 180px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent); background: rgba(59,130,246,.06);
    }
    .drop-zone:active {
      transform: scale(0.98);
    }
    .drop-zone svg {
      width: 44px; height: 44px; color: var(--accent); margin-bottom: .75rem;
      transition: transform .2s;
    }
    .drop-zone:hover svg { transform: translateY(-2px); }
    .drop-zone p { color: var(--text-muted); font-size: .9rem; line-height: 1.5; }
    .drop-zone .hint {
      display: inline-block; background: var(--surface2); padding: .35rem .8rem;
      border-radius: 8px; font-size: .8rem; color: var(--text);
      margin-top: .75rem; font-weight: 500;
    }
    .drop-zone .file-name {
      color: var(--accent); font-weight: 600; margin-top: .75rem; font-size: .85rem;
      display: flex; align-items: center; gap: .4rem; justify-content: center;
    }
    .drop-zone .file-name svg {
      width: 16px; height: 16px; margin: 0;
    }
    .drop-zone.has-file { border-color: var(--ok); border-style: solid; }
    .drop-zone.has-file svg:first-of-type { color: var(--ok); }

    input[type="file"] { display: none; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #fff; font-size: 1rem;
      font-weight: 600; border: none; border-radius: var(--radius);
      cursor: pointer; margin-top: 1.25rem;
      transition: opacity .2s, transform .15s;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: .35; cursor: not-allowed;
      background: var(--surface2);
      transform: none;
    }
    .btn svg { width: 20px; height: 20px; }

    .spinner {
      display: none; text-align: center; margin-top: 1.25rem;
    }
    .spinner.active { display: flex; flex-direction: column; align-items: center; }
    .spinner svg {
      width: 36px; height: 36px; color: var(--accent);
      animation: spin .8s linear infinite;
    }
    .spinner p { color: var(--text-muted); font-size: .85rem; margin-top: .5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center; margin-top: 1.5rem;
      color: var(--text-muted); font-size: .75rem;
    }

    .alert {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem;
      color: var(--danger); font-size: .85rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .alert svg { width: 20px; height: 20px; flex-shrink: 0; }

    .supported {
      text-align: center; margin-top: 1rem;
      color: var(--text-muted); font-size: .75rem;
    }
    .supported span {
      display: inline-block; background: var(--surface2); padding: .2rem .5rem;
      border-radius: 4px; font-size: .7rem; font-weight: 500; margin-left: .25rem;
    }

    @media (max-width: 480px) {
      body { padding: 1rem; padding-bottom: calc(1rem + var(--safe-bottom)); }
      .logo h1 { font-size: 1.3rem; }
      .card { padding: 1.25rem; }
      .drop-zone { padding: 2rem 1rem; min-height: 160px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1>Reservation <span>Audit</span> Engine</h1>
      <p>Envie o XML de reservas para auditoria automática</p>
    </div>

    {% if error %}
    <div class="alert">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form class="card" method="POST" enctype="multipart/form-data" action="/audit" id="auditForm">
      <div class="drop-zone" id="dropZone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <p>Arraste o arquivo XML aqui</p>
        <span class="hint">ou toque para selecionar</span>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" name="file" id="fileInput" accept=".xml,text/xml,application/xml">

      <button type="submit" class="btn" id="submitBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Analisar reservas
      </button>

      <div class="spinner" id="spinner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".25"/>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v3a5 5 0 00-5 5H4z"/>
        </svg>
        <p>Processando reservas...</p>
      </div>
    </form>

    <div class="supported">Formato aceito: <span>.XML</span> (Oracle RES_DETAIL)</div>
    <div class="footer">Reservation Audit Engine v1.0</div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const form = document.getElementById('auditForm');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        updateFile();
      }
    });

    fileInput.addEventListener('change', updateFile);

    function updateFile() {
      if (fileInput.files.length) {
        const f = fileInput.files[0];
        const sizeKB = (f.size / 1024).toFixed(0);
        fileName.innerHTML =
          '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/></svg>' +
          f.name + ' (' + sizeKB + ' KB)';
        dropZone.classList.add('has-file');
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', () => {
      submitBtn.disabled = true;
      submitBtn.style.display = 'none';
      spinner.classList.add('active');
    });
  </script>
</body>
</html>
