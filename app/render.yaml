services:
  - type: web
    name: reservation-audit-engine
    runtime: python
    # Raiz do repositório onde está o código (ajuste se o app estiver na pasta app/)
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    # PORT é definido automaticamente pelo Render
