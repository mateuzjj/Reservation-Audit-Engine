# Configuração para deploy no Render (raiz do repositório).
# O app está na pasta app/ — rootDir garante que o build rode de lá.
services:
  - type: web
    name: reservation-audit-engine
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
